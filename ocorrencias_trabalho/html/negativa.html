<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocorrencia - Negativa</title>
    <link rel="stylesheet" href="../css/negativa.css">
</head>
<body>
    
<nav class="navbar">
        <div class="logo-container">
            <img src="../imagens/logo.png.PNG" alt="Logo Colégio" class="logo">
        </div>
        <div class="stripes">
            <div class="stripe-top"></div>
            <div class="stripe-bottom"></div>
        </div>
    </nav>
    <div class="linha">

<div class="card">
    <h2>FICHA DE OCORRÊNCIA <br> NEGATIVA</h2>
    
    <form>
      <input type="text" placeholder="Nome do estudante" class="full-width">
      
      <div class="row">
        <input type="text" placeholder="CGM">
        <input type="text" placeholder="Turma">
      </div>
      
      <div class="row">
        <input type="text" placeholder="Disciplina">
        <input type="text" placeholder="Professor com">
      </div>
      
      <div class="row">
        <input type="date" placeholder="Data">
        
        <select class="select-gravidade">
          <option value="" disabled selected>Gravidade da ocorrência</option>
          <option value="leve">Leve</option>
          <option value="media">Média</option>
          <option value="grave">Grave</option>
        </select>
      </div>
      
      <textarea rows="8" placeholder="Descrição da ocorrência:"></textarea>
      
      <div class="footer">
        <button type="submit">enviar</button>
      </div>
    </form>
  </div>

</body>
</html>
